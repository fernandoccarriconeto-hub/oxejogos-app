<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bodyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2dd4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="hatGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b6f47;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5c4a31;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="eyeGlow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <circle cx="250" cy="250" r="245" fill="#f0f9ff" stroke="#e0f2fe" stroke-width="2"/>

  <g id="robot-body">
    <rect x="160" y="200" width="180" height="160" rx="20" fill="url(#bodyGradient)" stroke="#0891b2" stroke-width="2"/>
    <rect x="175" y="220" width="150" height="120" rx="10" fill="rgba(255,255,255,0.1)" stroke="#00d4ff" stroke-width="1.5" stroke-dasharray="3,3"/>
    <circle cx="250" cy="140" r="60" fill="url(#bodyGradient)" stroke="#0891b2" stroke-width="2"/>

    <g id="left-eye" filter="url(#eyeGlow)">
      <circle cx="220" cy="130" r="20" fill="#0ea5e9" stroke="#00d4ff" stroke-width="2"/>
      <circle cx="220" cy="130" r="13" fill="#00d4ff"/>
      <circle cx="224" cy="126" r="6" fill="#ffffff"/>
    </g>

    <g id="right-eye" filter="url(#eyeGlow)">
      <circle cx="280" cy="130" r="20" fill="#0ea5e9" stroke="#00d4ff" stroke-width="2"/>
      <circle cx="280" cy="130" r="13" fill="#00d4ff"/>
      <circle cx="284" cy="126" r="6" fill="#ffffff"/>
    </g>

    <path d="M 240 165 Q 250 175 260 165" stroke="#0891b2" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <circle cx="250" cy="169" r="2" fill="#0891b2"/>

    <g id="left-arm">
      <rect x="120" y="230" width="45" height="35" rx="8" fill="url(#bodyGradient)" stroke="#0891b2" stroke-width="2"/>
      <circle cx="115" cy="247" r="14" fill="url(#bodyGradient)" stroke="#0891b2" stroke-width="2"/>
      <circle cx="115" cy="247" r="8" fill="#00d4ff" opacity="0.5"/>
    </g>

    <g id="right-arm">
      <rect x="335" y="230" width="45" height="35" rx="8" fill="url(#bodyGradient)" stroke="#0891b2" stroke-width="2"/>
      <circle cx="385" cy="247" r="14" fill="url(#bodyGradient)" stroke="#0891b2" stroke-width="2"/>
      <circle cx="385" cy="247" r="8" fill="#00d4ff" opacity="0.5"/>
    </g>

    <g id="left-leg">
      <rect x="185" y="360" width="35" height="60" rx="8" fill="url(#bodyGradient)" stroke="#0891b2" stroke-width="2"/>
      <rect x="175" y="420" width="55" height="25" rx="6" fill="#1e40af" stroke="#0891b2" stroke-width="2"/>
    </g>

    <g id="right-leg">
      <rect x="280" y="360" width="35" height="60" rx="8" fill="url(#bodyGradient)" stroke="#0891b2" stroke-width="2"/>
      <rect x="270" y="420" width="55" height="25" rx="6" fill="#1e40af" stroke="#0891b2" stroke-width="2"/>
    </g>
  </g>

  <g id="cangaceiro-hat">
    <path d="M 160 100 Q 160 50 180 45 L 320 45 Q 340 50 340 100"
          fill="url(#hatGradient)" stroke="#3d2817" stroke-width="2" filter="url(#glow)"/>
    <ellipse cx="250" cy="85" rx="55" ry="70" fill="url(#hatGradient)" stroke="#3d2817" stroke-width="2"/>
    <rect x="170" y="98" width="160" height="12" rx="2" fill="#6b4e2e" stroke="#3d2817" stroke-width="1.5"/>
    <line x1="170" y1="104" x2="330" y2="104" stroke="#3d2817" stroke-width="1"/>

    <g id="star-left">
      <polygon points="200,75 205,88 219,88 208,97 213,110 200,101 187,110 192,97 181,88 195,88"
               fill="#f9a825" stroke="#d97706" stroke-width="1"/>
    </g>

    <g id="star-center">
      <polygon points="250,55 255,68 269,68 258,77 263,90 250,81 237,90 242,77 231,68 245,68"
               fill="#f9a825" stroke="#d97706" stroke-width="1"/>
    </g>

    <g id="star-right">
      <polygon points="300,75 305,88 319,88 308,97 313,110 300,101 287,110 292,97 281,88 295,88"
               fill="#f9a825" stroke="#d97706" stroke-width="1"/>
    </g>

    <circle cx="190" cy="65" r="4" fill="#f9a825" stroke="#d97706" stroke-width="1"/>
    <circle cx="310" cy="65" r="4" fill="#f9a825" stroke="#d97706" stroke-width="1"/>
    <circle cx="250" cy="42" r="3" fill="#f9a825" stroke="#d97706" stroke-width="1"/>
  </g>

  <rect x="190" y="245" width="120" height="80" rx="8" fill="#0ea5e9" stroke="#00d4ff" stroke-width="2" opacity="0.6"/>
  <rect x="195" y="250" width="110" height="70" rx="6" fill="#00d4ff" opacity="0.3"/>

  <line x1="250" y1="15" x2="250" y2="-5" stroke="#0891b2" stroke-width="3" stroke-linecap="round"/>
  <circle cx="250" cy="-10" r="4" fill="#00d4ff" stroke="#0891b2" stroke-width="1.5"/>

  <ellipse cx="200" cy="180" rx="25" ry="40" fill="white" opacity="0.15" filter="url(#glow)"/>

  <g id="corner-stars" opacity="0.4">
    <circle cx="80" cy="80" r="5" fill="#f9a825"/>
    <circle cx="420" cy="100" r="4" fill="#f9a825"/>
    <circle cx="70" cy="350" r="4" fill="#f9a825"/>
    <circle cx="430" cy="380" r="5" fill="#f9a825"/>
  </g>
</svg>